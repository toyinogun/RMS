apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-image-updater
  namespace: argocd
  annotations:
    # Lands after argocd-secrets (-9) so the git-creds SealedSecret is
    # already present when the controller starts, and before solutio-secrets
    # (-5) / solutio-web (0) so the controller is reconciling images for
    # the workload apps from their first sync.
    argocd.argoproj.io/sync-wave: "-8"
spec:
  project: default
  source:
    repoURL: https://github.com/toyinogun/RMS.git
    path: deploy/k8s/image-updater
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      # CRD has metadata.annotations larger than the kubectl client-side
      # patch limit, and ClusterRoles/ClusterRoleBindings are happier
      # under SSA. Matches the cnpg-cluster app.
      - ServerSideApply=true
      - CreateNamespace=false
