name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guards:
    name: Pinning guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - run: bash scripts/check-no-caret.sh
      - run: bash scripts/check-no-unpinned-from.sh
      - run: bash scripts/check-no-unpinned-uses.sh
      - run: bash scripts/check-no-unsealed-secret.sh

  test:
    name: Lint + typecheck + test
    runs-on: ubuntu-latest
    needs: guards
    services:
      # Shadow Postgres used by `prisma migrate diff --from-migrations` to
      # replay migrations and compute the schema diff. SHA-pinned to the same
      # Postgres digest as testcontainers + local dev.
      postgres:
        image: postgres:18.3-bookworm@sha256:80630f83606d8db77d30b3851b16a9f78be2d0d4dda6f7b82a1fdca5ebe3acba
        env:
          POSTGRES_USER: solutio
          POSTGRES_PASSWORD: solutio
          POSTGRES_DB: solutio
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U solutio -d solutio"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      # Prisma 7's prisma.config.ts evaluates env('DATABASE_URL') eagerly at
      # config-load, even for `prisma generate` / `prisma validate` which do
      # not connect. The value just needs to be a parseable URL.
      DATABASE_URL: postgresql://solutio:solutio@localhost:5432/solutio?schema=public
      SHADOW_DATABASE_URL: postgresql://solutio:solutio@localhost:5432/shadow?schema=public
      # `pnpm test` runs the integration project too — testcontainers needs
      # ryuk disabled when run inside ephemeral CI runners.
      TESTCONTAINERS_RYUK_DISABLED: "true"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
        with:
          version: 11.1.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Prisma client types are generated, not bundled — must exist before typecheck.
      - run: pnpm --filter @solutio/db prisma:generate
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm --filter @solutio/db prisma:validate
      # AC #4 — drift check between prisma/migrations and schema.prisma.
      # Replays migrations onto the shadow Postgres service.
      - name: Create shadow database
        run: PGPASSWORD=solutio psql -h localhost -U solutio -d solutio -c 'CREATE DATABASE shadow;'
      - run: pnpm --filter @solutio/db prisma:diff
      # `pnpm test` runs all projects including integration (which spins up
      # testcontainers Postgres). The dedicated `pnpm test:integration` step
      # from the original plan is dropped — it would re-run integration
      # tests redundantly.
      - run: pnpm test --coverage.enabled --coverage.thresholds.lines=80 --coverage.thresholds.functions=80 --coverage.thresholds.branches=80 --coverage.thresholds.statements=80

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: test
    # E2E only runs on PRs targeting main (per spec memory note).
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    env:
      # Prisma 7's prisma.config.ts evaluates env('DATABASE_URL') eagerly at
      # config-load, even for `prisma generate` which doesn't connect. The
      # value just needs to be a parseable URL; test:e2e brings its own
      # testcontainer Postgres for the actual run.
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder?schema=public
      TESTCONTAINERS_RYUK_DISABLED: "true"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
        with: { version: 11.1.1 }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Prisma client types are generated, not bundled — must exist before
      # `next build` typechecks `@solutio/db` imports.
      - run: pnpm --filter @solutio/db prisma:generate
      - run: pnpm --filter @solutio/web exec playwright install --with-deps chromium
      - run: pnpm --filter @solutio/web build
      - run: pnpm --filter @solutio/web test:e2e
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            apps/web/test-results
            apps/web/playwright-report
          if-no-files-found: ignore
          retention-days: 7
