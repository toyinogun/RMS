apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: solutio-web
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    # Image-updater configuration lives in the ImageUpdater CR at
    # deploy/k8s/image-updater-rules/imageupdater-solutio-web.yaml — the
    # legacy argocd-image-updater.argoproj.io/* annotations that used to
    # be here are not honored in v1.2.0 (useAnnotations defaults to false).
spec:
  project: default
  source:
    repoURL: https://github.com/toyinogun/RMS.git
    path: deploy/k8s/web
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: solutio-prod
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - CreateNamespace=true
