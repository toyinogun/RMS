apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: solutio-web
  namespace: solutio-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: solutio-web
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
