apiVersion: apps/v1
kind: Deployment
metadata:
  name: solutio-web
  namespace: solutio-prod
  labels: { app: solutio-web }
spec:
  replicas: 2
  selector:
    matchLabels: { app: solutio-web }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata:
      labels: { app: solutio-web }
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        # 65532 is the UID of the `nonroot` user in distroless images. Kubelet
        # cannot verify a non-numeric image USER directive against
        # runAsNonRoot, so the UID is set explicitly here.
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: web
          image: ghcr.io/toyinogun/rms:placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
          envFrom:
            - secretRef: { name: solutio-db }
            - secretRef: { name: solutio-auth }
          readinessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 6
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 1000m, memory: 768Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
