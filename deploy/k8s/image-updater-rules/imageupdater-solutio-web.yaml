# Tells the argocd-image-updater controller (v1.2.0+) which images to track
# for the solutio-web Argo CD Application and where to write the resulting
# digest bumps.
#
# Why explicit images instead of useAnnotations: true:
#   The annotation-based parser in v1.2.0 silently dropped the second
#   image in a comma-separated image-list (only `web` was considered,
#   `migrate` never showed up in reconcile logs). Declaring images here
#   directly is the supported native form and works around the bug.
#
# The matching annotations on solutio-web.yaml are now ignored (because
# useAnnotations defaults to false) and will be removed in a follow-up
# PR — keeping them in this PR keeps the diff small and easy to revert.
apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: solutio-web
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-image-updater
    app.kubernetes.io/part-of: argocd-image-updater-controller
spec:
  writeBackConfig:
    method: "git:secret:argocd/git-creds"
    gitConfig:
      branch: main
      # Path is relative to the Application's spec.source.path (deploy/k8s/web),
      # so "." means "the kustomization.yaml in that same directory".
      writeBackTarget: "kustomization:."
  applicationRefs:
    - namePattern: "solutio-web"
      images:
        - alias: "web"
          imageName: "ghcr.io/toyinogun/rms:main"
          commonUpdateSettings:
            updateStrategy: "digest"
        - alias: "migrate"
          imageName: "ghcr.io/toyinogun/rms-migrate:main"
          commonUpdateSettings:
            updateStrategy: "digest"
