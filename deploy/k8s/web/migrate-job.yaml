apiVersion: batch/v1
kind: Job
metadata:
  name: solutio-migrate
  namespace: solutio-prod
  annotations:
    # Runs before the web Deployment is synced, so the schema is current
    # before the new pods start. Recreated each sync; deleted when the new
    # one is created so logs of the previous run stay around for debugging.
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 2
  template:
    metadata:
      labels: { app: solutio-migrate }
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      containers:
        - name: migrate
          image: ghcr.io/toyinogun/rms-migrate:placeholder
          imagePullPolicy: IfNotPresent
          command: ["pnpm", "--filter", "@solutio/db", "prisma:migrate:deploy"]
          envFrom:
            - secretRef: { name: solutio-db }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 1000m, memory: 768Mi }
